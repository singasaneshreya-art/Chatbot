<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support AI - Customer Service Chatbot</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  
  <div class="app-container">
    
    <!-- Left Sidebar -->
    <aside class="sidebar">
      <!-- Sidebar Header -->
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-logo">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="white">
              <path d="M11.5 2L3 13.5h7L9 22l9.5-11.5h-7L11.5 2z" fill="white"/>
            </svg>
          </div>
          <span class="brand-name">Support AI</span>
        </div>
      </div>
      
      <!-- Action Button -->
      <button class="new-chat-btn" id="new-chat-btn">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
        </svg>
        <span>New Chat</span>
      </button>
      
      <!-- Operating Hours -->
      <div class="sidebar-section">
        <span class="section-title">{{ operating_hours_title }}</span>
        <ul class="hours-list">
          {% for item in sidebar_hours %}
          <li class="hours-item">
            {% if item.icon == 'clock' %}
            <svg viewBox="0 0 24 24" width="16" height="16" class="item-icon">
              <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>
            </svg>
            {% else %}
            <svg viewBox="0 0 24 24" width="16" height="16" class="item-icon">
              <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2zm-7 5h5v5h-5z"/>
            </svg>
            {% endif %}
            <span class="hours-text">{{ item.label }}</span>
          </li>
          {% endfor %}
        </ul>
      </div>
      
      <!-- User Profile widget at bottom -->
      <div class="sidebar-footer">
        <!-- Language Selector -->
        <div class="language-selector" id="language-selector">
          <button class="language-btn" id="language-btn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" class="language-globe-icon">
              <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95a15.65 15.65 0 0 0-1.38-3.56A8.03 8.03 0 0 1 18.92 8zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2 0 .68.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56A7.987 7.987 0 0 1 5.08 16zm2.95-8H5.08a7.987 7.987 0 0 1 4.33-3.56A15.65 15.65 0 0 0 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2 0-.68.07-1.35.16-2h4.68c.09.65.16 1.32.16 2 0 .68-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95a8.03 8.03 0 0 1-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2 0-.68-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/>
            </svg>
            <span class="language-label" id="language-label">
              {% if active_language == 'hi' %}हिन्दी
              {% elif active_language == 'es' %}Español
              {% elif active_language == 'fr' %}Français
              {% elif active_language == 'de' %}Deutsch
              {% elif active_language == 'ja' %}日本語
              {% else %}English{% endif %}
            </span>
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" class="language-chevron" id="language-chevron">
              <path d="M7 10l5 5 5-5z"/>
            </svg>
          </button>
          <div class="language-dropdown" id="language-dropdown">
            <button class="language-option {% if active_language == 'en' or not active_language %}active{% endif %}" data-lang="en">English</button>
            <button class="language-option {% if active_language == 'hi' %}active{% endif %}" data-lang="hi">हिन्दी</button>
            <button class="language-option {% if active_language == 'es' %}active{% endif %}" data-lang="es">Español</button>
            <button class="language-option {% if active_language == 'fr' %}active{% endif %}" data-lang="fr">Français</button>
            <button class="language-option {% if active_language == 'de' %}active{% endif %}" data-lang="de">Deutsch</button>
            <button class="language-option {% if active_language == 'ja' %}active{% endif %}" data-lang="ja">日本語</button>
          </div>
        </div>

        <div class="profile-card">
          <img class="profile-avatar" src="/static/images/avatar.png" alt="Alex Henderson">
          <div class="profile-info">
            <div class="profile-name-row">
              <span class="profile-name">Alex Henderson</span>
              <button class="settings-btn">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                  <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
              </button>
            </div>
            <div class="profile-status">
              <span class="profile-status-dot"></span>
              <span class="profile-status-text">Active Now</span>
            </div>
          </div>
        </div>
        <div class="profile-tier-row">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" class="tier-icon">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
          </svg>
          <span class="profile-tier-text">Enterprise Tier</span>
        </div>
        <button class="logout-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
          </svg>
          <span>Logout</span>
        </button>
      </div>
    </aside>
    
    <!-- Main Chat Interface -->
    <main class="chat-container">
      
      <!-- Top Header -->
      <header class="chat-header">
        <div class="header-right">
          <!-- Notification Bell Icon -->
          <button class="header-icon-btn" id="notification-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/>
            </svg>
          </button>
          <!-- Help / Question Icon -->
          <button class="header-icon-btn" id="help-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm1.01 16h-2v-2h2v2zm1.15-6.03l-.9.92C12.54 13.62 12 14 12 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.62.77.77.78.78.78.78z"/>
            </svg>
          </button>
        </div>
      </header>
      
      <!-- Chat Main Feed -->
      <div class="chat-main">
        <!-- Messages List -->
        <div class="message-list" id="message-list">
          <!-- Messages will be injected here dynamically -->
        </div>
      </div>
      
      <!-- Footer Input Section -->
      <footer class="chat-footer-area">
        <!-- Footer Action Chips Row -->
        <div class="quick-chips-wrapper">
          <div class="chips-container" id="chips-container">
            <!-- Dynamic Chips will be placed here -->
          </div>
        </div>
        
        <!-- Input Wrapper -->
        <div class="input-wrapper">
          <div class="input-container">
            <!-- Left Microphone Icon -->
            <button class="input-icon-btn" id="mic-btn">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
              </svg>
            </button>
            
            <!-- Textarea input -->
            <textarea id="chat-input" placeholder="Type your message here..." rows="1"></textarea>
            
            <!-- Right Send Button -->
            <button id="send-btn" class="send-btn">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="white">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
              </svg>
            </button>
          </div>
          
          <!-- Bottom Security & Privacy labels -->
          <div class="footer-privacy-row">
            <div class="privacy-left">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor" style="vertical-align: middle; margin-right: 4px;">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
              </svg>
              <span>End-to-end encrypted</span>
            </div>
          </div>
        </div>
      </footer>
      
    </main>
    
  </div>

  <!-- Scripts -->
  <script>
    window.APP_CONFIG = {
      activeLanguage: "{{ active_language or 'en' }}",
      welcomeText: `{{ welcome_text | safe }}`,
      welcomeChips: {{ welcome_chips | tojson }}
    };
  </script>
  <script src="/static/js/app.js"></script>
</body>
</html>
